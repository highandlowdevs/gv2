name: Keep Codespace Alive (Advanced)

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Wake and Ping Codespace
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          
          log() {
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] $1"
          }

          log "===== Keep Alive Job Started ====="

          # ✅ 1. بررسی توکن
          if [ -z "$GH_TOKEN" ]; then
            log "ERROR: PAT_TOKEN is missing!"
            exit 1
          fi

          log "Authenticating with GitHub CLI..."
          # اهراز هویت دقیق به جای تکیه بر متغیر محیطی
          echo "$GH_TOKEN" | gh auth login --with-token

          # ✅ 2. پیدا کردن codespace مربوط به همین repo
          log "Searching for codespace for repo: $REPO"

          CS_INFO=$(gh codespace list --repo $REPO --json name,state)
          CS_NAME=$(echo "$CS_INFO" | jq -r '.[0].name // empty')
          CS_STATE=$(echo "$CS_INFO" | jq -r '.[0].state // empty')

          if [ -z "$CS_NAME" ] || [ "$CS_NAME" == "null" ]; then
            log "No codespace found for this repository. Exiting safely."
            exit 0
          fi

          log "Found Codespace: $CS_NAME"
          log "Current State: $CS_STATE"

          # ✅ 3. اگر خاموش است، روشن کن
          if [ "$CS_STATE" != "Available" ]; then
            log "Codespace is not running. Starting..."
            gh codespace start -c "$CS_NAME"
          else
            log "Codespace already running."
          fi

          # ✅ 4. صبر تا آماده شدن (حلقه انتظار هوشمند)
          log "Waiting for codespace to become available..."
          for i in {1..10}; do
            STATE=$(gh codespace view -c "$CS_NAME" --json state --jq '.state')
            if [ "$STATE" == "Available" ]; then
              log "Codespace is available."
              break
            fi
            log "Still not ready... retry $i/10"
            sleep 10
          done

          # ✅ 5. SSH Retry Logic (رفع ارورهای احتمالی در زمان روشن شدن)
          log "Sending keep-alive ping via SSH..."

          for i in {1..5}; do
            if gh codespace ssh -c "$CS_NAME" -- "echo 'Ping at $(date)' >> /tmp/keepalive.log"; then
              log "SSH ping successful ✅"
              break
            else
              log "SSH attempt $i failed. Retrying in 10 seconds..."
              sleep 10
            fi
          done

          log "===== Keep Alive Job Finished ====="
