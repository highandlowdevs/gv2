name: Keep Codespace Alive

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest

    steps:
      - name: Wake Up and Ping Codespace
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "ERROR: PAT_TOKEN is missing! Please add it to your Repository Secrets."
            exit 1
          fi
          
          CS_NAME=$(gh codespace list --json name --jq '.[0].name')
          
          if [ -z "$CS_NAME" ] || [ "$CS_NAME" == "null" ]; then
            echo "No codespaces found for this repo. Skipping."
            exit 0
          fi
          
          echo "Found Codespace: $CS_NAME"
          
          echo "Sending keep-alive ping via SSH..."
          gh codespace ssh -c $CS_NAME -- "echo 'Ping at $(date)' > /tmp/keepalive.log"
